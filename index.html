<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title-tag">TaskFlow AI - Gerenciador Inteligente</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="container mx-auto max-w-4xl p-6">
        <!-- Cabeçalho -->
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 id="site-name" class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    TaskFlow AI
                </h1>
                <p id="site-subtitle" class="text-slate-400 text-sm mt-1">Gerenciamento de tarefas com priorização inteligente.</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="stats" class="text-xs bg-slate-800 px-4 py-2 rounded-full border border-slate-700 text-slate-300">
                    Carregando...
                </div>
                <!-- Botão Secreto de Admin -->
                <button id="admin-login-btn" class="text-slate-600 hover:text-slate-400 text-xs p-1">⚙️</button>
            </div>
        </header>

        <!-- PAINEL DE CUSTOMIZAÇÃO (SÓ APARECE PARA VOCÊ) -->
        <section id="admin-panel" class="hidden mb-8 bg-gradient-to-r from-purple-900/40 to-indigo-900/40 border border-purple-500/30 p-6 rounded-2xl animate-fade-in">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-purple-300 font-bold flex items-center gap-2">🛠️ Modo Desenvolvedor Ativo</h3>
                <button id="admin-logout-btn" class="text-xs bg-purple-500/20 hover:bg-purple-500/40 text-purple-300 px-3 py-1 rounded-lg">Sair do Modo Admin</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Nome do Site</label>
                    <input type="text" id="custom-name" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-200">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Subtítulo</label>
                    <input type="text" id="custom-subtitle" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-200">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Cor do Tema (Gradiente)</label>
                    <select id="custom-theme" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-200">
                        <option value="from-blue-400 to-emerald-400">Padrão (Azul/Verde)</option>
                        <option value="from-purple-500 to-pink-500">Neon (Roxo/Rosa)</option>
                        <option value="from-amber-400 to-red-500">Fogo (Laranja/Vermelho)</option>
                        <option value="from-cyan-400 to-blue-600">Oceano (Ciano/Azul)</option>
                    </select>
                </div>
            </div>
            <button id="save-custom-btn" class="mt-4 bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors">
                Salvar Alterações no Site
            </button>
        </section>

        <!-- Painel Principal (Formulário e Lista) -->
        <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Formulário -->
            <section class="md:col-span-1 bg-slate-800 p-5 rounded-2xl border border-slate-700 h-fit">
                <h2 class="text-lg font-bold mb-4 text-slate-200">Nova Tarefa</h2>
                <form id="task-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Título</label>
                        <input type="text" id="task-title" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="Ex: Estudar Node.js">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Prazo (Deadline)</label>
                        <input type="date" id="task-date" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Impacto no Negócio</label>
                        <select id="task-impact" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                            <option value="1">Baixo</option>
                            <option value="2">Médio</option>
                            <option value="3">Alto / Crítico</option>
                        </select>
                    </div>
                    <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-blue-500 to-emerald-500 hover:from-blue-600 hover:to-emerald-600 text-white font-medium text-sm py-2.5 rounded-lg transition-all shadow-lg shadow-blue-500/10">
                        Adicionar com AI
                    </button>
                </form>
            </section>

            <!-- Lista de Tarefas -->
            <section class="md:col-span-2 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-slate-200">Fila de Execução Otimizada</h2>
                    <span class="text-xs text-emerald-400 font-mono bg-emerald-500/10 px-2 py-1 rounded">AI Sorting: Ativo</span>
                </div>
                <div id="tasks-container" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
